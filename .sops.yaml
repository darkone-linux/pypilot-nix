# sops creation rules — managed by `just init <host>`.
#
# This distro ships NO real secret: rules are added per host by `just init`,
# which mints the host's age key (uncommitted, secrets/keys/<host>.txt) and
# registers its PUBLIC key here for secrets/<host>.yaml. Public keys are not
# secret — committing them is expected. The example host lab-rpi02 evaluates
# without any secret (a build-time warning), so `nix flake check` stays green.
#
# After editing a recipient by hand, re-encrypt: `sops updatekeys secrets/<host>.yaml`.

creation_rules: []
