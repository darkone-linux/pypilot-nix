# Release — publish a GitHub release on every v*.*.* tag.
#
# Builds a clean source tarball with `git archive` and uses the matching
# CHANGELOG section as the release notes. GitHub also attaches its own
# auto-generated "Source code" archives.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Build source tarball
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          name="pypilot-nix-${{ steps.ver.outputs.version }}"
          git archive --format=tar.gz --prefix="${name}/" -o "${name}.tar.gz" "${tag}"

      # Slice the section for this version out of the changelog.
      - name: Extract release notes
        run: |
          v="${{ steps.ver.outputs.version }}"
          awk -v ver="$v" '
            $0 ~ "^## \\[" ver "\\]" { grab = 1; next }
            grab && /^## / { exit }
            grab { print }
          ' CHANGELOG.md > NOTES.md
          if [ ! -s NOTES.md ]; then
            echo "Release ${{ steps.ver.outputs.tag }}" > NOTES.md
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes-file NOTES.md \
            "pypilot-nix-${{ steps.ver.outputs.version }}.tar.gz"
